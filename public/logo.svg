<svg width="560" height="150" viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DronWay">
  <title>DronWay</title>
  <!-- Palette: graphite #15181C, signal blue #1E63E9, path gray #B8C0CC -->

  <!-- ICON: top-view multirotor drone -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- arms -->
    <g stroke="#15181C" stroke-width="7">
      <line x1="85" y1="70" x2="61" y2="46"/>
      <line x1="85" y1="70" x2="109" y2="46"/>
      <line x1="85" y1="70" x2="61" y2="94"/>
      <line x1="85" y1="70" x2="109" y2="94"/>
    </g>
    <!-- rotors -->
    <circle cx="61"  cy="46" r="13" fill="none" stroke="#15181C" stroke-width="4"/>
    <circle cx="109" cy="46" r="13" fill="none" stroke="#1E63E9" stroke-width="4"/>
    <circle cx="61"  cy="94" r="13" fill="none" stroke="#15181C" stroke-width="4"/>
    <circle cx="109" cy="94" r="13" fill="none" stroke="#15181C" stroke-width="4"/>
    <!-- body -->
    <rect x="73" y="58" width="24" height="24" rx="7" fill="#15181C"/>
    <circle cx="85" cy="70" r="3.4" fill="#1E63E9"/>
  </g>

  <!-- WORDMARK -->
  <text x="178" y="90" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="62" letter-spacing="-1.5">
    <tspan fill="#15181C">Dron</tspan><tspan fill="#1E63E9">Way</tspan>
  </text>

  <!-- STEP PATH: Шаг 0 → 3 brand device -->
  <g>
    <line x1="186" y1="120" x2="500" y2="120" stroke="#B8C0CC" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/>
    <circle cx="186" cy="120" r="4" fill="#B8C0CC"/>
    <circle cx="291" cy="120" r="4" fill="#B8C0CC"/>
    <circle cx="396" cy="120" r="4" fill="#B8C0CC"/>
    <circle cx="500" cy="120" r="6" fill="#1E63E9"/>
  </g>
</svg>
